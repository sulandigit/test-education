# Dashboard服务网关路由配置
# 该配置应添加到Nacos配置管理中的gateway.properties文件

# Dashboard服务路由配置
spring.cloud.gateway.routes[0].id=dashboard-service
spring.cloud.gateway.routes[0].uri=lb://roncoo-education-service-dashboard
spring.cloud.gateway.routes[0].predicates[0]=Path=/dashboard/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Dashboard WebSocket路由配置
spring.cloud.gateway.routes[1].id=dashboard-websocket
spring.cloud.gateway.routes[1].uri=lb://roncoo-education-service-dashboard
spring.cloud.gateway.routes[1].predicates[0]=Path=/ws/dashboard/**

# Dashboard前端静态资源路由（如果前端部署在网关后）
spring.cloud.gateway.routes[2].id=dashboard-frontend
spring.cloud.gateway.routes[2].uri=lb://dashboard-frontend-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/dashboard-ui/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# CORS配置
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# 超时配置
spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=60s