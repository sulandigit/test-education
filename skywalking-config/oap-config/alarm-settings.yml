# SkyWalking 告警规则配置

rules:
  # 服务可用性告警
  service_availability_rule:
    metrics-name: service_percent
    op: <
    threshold: 80
    period: 2
    count: 3
    silence-period: 10
    message: "服务[{name}]可用性低于80%，当前值: {value}%"

  # 服务平均响应时间告警
  service_resp_time_rule:
    metrics-name: service_resp_time
    op: ">"
    threshold: 3000
    period: 2
    count: 2
    silence-period: 10
    message: "服务[{name}]平均响应时间超过3秒，当前值: {value}ms"

  # 服务P99响应时间告警
  service_p99_resp_time_rule:
    metrics-name: service_p99
    op: ">"
    threshold: 5000
    period: 2
    count: 2
    silence-period: 10
    message: "服务[{name}] P99响应时间超过5秒，当前值: {value}ms"

  # 服务实例可用性告警
  service_instance_availability_rule:
    metrics-name: service_instance_percent
    op: <
    threshold: 70
    period: 2
    count: 2
    silence-period: 10
    message: "服务实例[{name}]可用性低于70%，当前值: {value}%"

  # 数据库访问慢查询告警
  database_access_resp_time_rule:
    metrics-name: database_access_resp_time
    op: ">"
    threshold: 1000
    period: 2
    count: 2
    silence-period: 10
    message: "数据库访问响应时间超过1秒，当前值: {value}ms"

  # 端点平均响应时间告警
  endpoint_avg_resp_time_rule:
    metrics-name: endpoint_avg
    op: ">"
    threshold: 2000
    period: 2
    count: 2
    silence-period: 10
    message: "端点[{name}]平均响应时间超过2秒，当前值: {value}ms"

