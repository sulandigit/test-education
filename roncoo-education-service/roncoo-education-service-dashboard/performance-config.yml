# Dashboard服务性能优化配置
# 该配置应添加到application.yml中

spring:
  # 数据库连接池优化
  datasource:
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接超时时间(毫秒)
      connection-timeout: 30000
      # 空闲连接存活最大时间(毫秒)
      idle-timeout: 600000
      # 连接池中连接的最长生命周期(毫秒)
      max-lifetime: 1800000
      # 数据库连接超时时间(毫秒)
      validation-timeout: 5000
      # 空闲连接存活最小时间(毫秒)
      keepalive-time: 30000

  # Redis优化配置
  redis:
    # 连接超时时间
    timeout: 10000ms
    # 连接池配置
    lettuce:
      pool:
        # 最大连接数
        max-active: 50
        # 最大空闲连接数
        max-idle: 20
        # 最小空闲连接数
        min-idle: 5
        # 获取连接最大等待时间
        max-wait: 10000ms
      # 关闭超时时间
      shutdown-timeout: 100ms

  # JPA优化配置
  jpa:
    hibernate:
      # 二级缓存
      cache:
        use_second_level_cache: true
        use_query_cache: true
    properties:
      hibernate:
        # SQL批处理大小
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        # 启用统计
        generate_statistics: true
        # 懒加载优化
        enable_lazy_load_no_trans: true

# 服务器性能配置
server:
  # Tomcat优化
  tomcat:
    # 最大线程数
    threads:
      max: 200
      min-spare: 20
    # 最大连接数
    max-connections: 8192
    # 连接超时时间
    connection-timeout: 20000
    # 最大请求头大小
    max-http-header-size: 8192
    # 请求体最大大小
    max-swallow-size: 2MB

# 日志性能配置
logging:
  level:
    # 生产环境建议设置为WARN或ERROR
    com.roncoo.education.dashboard: INFO
    # SQL日志在生产环境关闭
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# JVM性能监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# 异步配置
async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 200
  thread-name-prefix: DashboardAsync-

# WebSocket配置优化
websocket:
  # 消息缓冲区大小
  buffer-size: 8192
  # 最大空闲时间
  idle-timeout: 300000
  # 心跳间隔
  heartbeat-interval: 30000