spring:
  application:
    name: roncoo-education-service-dashboard
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
        shared-configs:
          - data-id: application-${spring.profiles.active}.yml
            refresh: true
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 10
    timeout: 30000
    password: 
    jedis:
      pool:
        max-active: 50
        max-wait: -1
        max-idle: 10
        min-idle: 2

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/roncoo_education?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    
# 服务端口
server:
  port: 8084

# Feign配置
feign:
  hystrix:
    enabled: true
    
# 日志配置
logging:
  level:
    com.roncoo.education: debug
    
# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Mybatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mybatis/*.xml