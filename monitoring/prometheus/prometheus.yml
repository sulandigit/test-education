# Prometheus 配置文件
# 领课教育系统监控配置

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'education-system'
    environment: 'production'

# 告警规则文件
rule_files:
  - "rules/*.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 监控目标配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 30s

  # 领课教育网关服务监控
  - job_name: 'education-gateway'
    static_configs:
      - targets: ['gateway:7700']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: application
        replacement: 'education-gateway'
      - target_label: service
        replacement: 'gateway'

  # 系统管理服务监控
  - job_name: 'education-system'
    static_configs:
      - targets: ['system:7710']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: application
        replacement: 'education-system'
      - target_label: service
        replacement: 'system'

  # 用户管理服务监控
  - job_name: 'education-user'
    static_configs:
      - targets: ['user:7720']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: application
        replacement: 'education-user'
      - target_label: service
        replacement: 'user'

  # 课程管理服务监控
  - job_name: 'education-course'
    static_configs:
      - targets: ['course:7730']
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: application
        replacement: 'education-course'
      - target_label: service
        replacement: 'course'

  # 节点监控 (系统资源监控)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    relabel_configs:
      - target_label: application
        replacement: 'node-exporter'

# 远程存储配置 (可选)
# remote_write:
#   - url: "http://remote-storage:8086/api/v1/prom/write?db=prometheus"

# 存储配置
storage:
  tsdb:
    # 数据保留时间
    retention.time: 30d
    # 数据压缩
    wal-compression: true